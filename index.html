<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>칼로리 스캔</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* 기존 스타일은 100% 유지 (사용자님 원본 스타일과 동일) */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#F4F6FA;color:#191F28;font-family:'Noto Sans KR',-apple-system,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding-top:env(safe-area-inset-top,0px)}
.topbar{background:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #EAECF0;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.gear-btn{background:none;border:none;font-size:20px;cursor:pointer}
.scr{display:none;flex-direction:column;flex:1;overflow-y:auto;padding-bottom:80px}
.scr.on{display:flex}
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(64px + env(safe-area-inset-bottom,0px));background:#fff;border-top:1px solid #EAECF0;display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;gap:3px;padding:0}
.nb-icon{font-size:20px;transition:transform 0.15s}
.nb.on .nb-icon{transform:scale(1.15)}
.nb-txt{font-size:9px;color:#8B95A1;font-weight:500}
.nb.on .nb-txt{color:#FF6B35;font-weight:700}
.content{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.sec{font-size:11px;font-weight:700;color:#8B95A1;margin-bottom:12px;letter-spacing:0.5px;text-transform:uppercase}
.row{display:flex;gap:8px}
.inp{flex:1;background:#F5F6F8;border:1.5px solid #EAECF0;border-radius:12px;padding:12px 14px;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s}
.inp:focus{border-color:#FF6B35}
.sbtn{background:#FF6B35;color:#fff;border:none;border-radius:12px;padding:12px 18px;font-weight:700;font-family:inherit;cursor:pointer;font-size:14px}
.meal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.chip{background:#F5F6F8;border-radius:12px;padding:10px 4px;cursor:pointer;border:1.5px solid transparent;font-size:12px;font-family:inherit;font-weight:500;transition:all 0.15s;text-align:center}
.chip.on{background:#FFF2EC;border-color:#FF6B35;color:#FF6B35;font-weight:700}
.up-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.up-btn{background:#fff;border:1.5px dashed #D0D5DD;border-radius:18px;padding:28px 10px;text-align:center;position:relative;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit;color:#344054;transition:all 0.15s}
.up-btn:hover{border-color:#FF6B35;background:#FFF8F5}
.up-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.up-btn-icon{font-size:28px;display:block;margin-bottom:8px}
.prev{border-radius:18px;overflow:hidden;display:none;margin-top:4px}
.prev img{width:100%;max-height:220px;object-fit:cover;display:block}
.cta{background:#FF6B35;color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;font-family:inherit;width:100%;margin-top:10px;cursor:pointer;letter-spacing:-0.3px}
.reset-btn{background:none;border:none;color:#8B95A1;width:100%;margin-top:8px;font-size:13px;font-family:inherit;cursor:pointer;text-decoration:underline;padding:6px}
.res-wrap{display:none;flex-direction:column;gap:12px;margin-top:4px}
.cal-hero{background:linear-gradient(135deg,#FF6B35 0%,#FF9A6C 100%);border-radius:20px;padding:24px 20px;color:#fff;text-align:center}
.cal-num{font-size:54px;font-weight:900;line-height:1;letter-spacing:-2px}
.cal-sub{font-size:13px;font-weight:600;opacity:0.85;margin-top:6px}
.add-btn{background:#12B76A;color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;font-family:inherit;width:100%;cursor:pointer}
#loader,#workoutLoader,#textLoader{display:none;flex-direction:column;align-items:center;padding:24px 20px;gap:12px}
.loader-bar{width:100%;height:4px;background:#F0F0F0;border-radius:2px;overflow:hidden}
.loader-fill{height:100%;background:linear-gradient(90deg,#FF6B35,#FFAB85,#FF6B35);background-size:200%;animation:shimmer 1.5s infinite;border-radius:2px}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
.loader-txt{font-size:14px;font-weight:700;color:#FF6B35}
.err{background:#FFF0F1;color:#F04452;padding:14px;border-radius:12px;display:none;font-size:13px;margin-top:4px;font-weight:500}
.today-hero{border-radius:22px;padding:22px 20px;background:#191F28;color:#fff;position:relative;overflow:hidden}
.today-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,107,53,0.15)}
.today-label{font-size:11px;opacity:0.5;font-weight:500;letter-spacing:0.5px;text-transform:uppercase}
.today-kcal{font-size:44px;font-weight:900;letter-spacing:-2px;margin:4px 0}
.today-goal{font-size:12px;opacity:0.6;font-weight:500}
.prog-wrap{background:rgba(255,255,255,0.12);border-radius:6px;height:8px;margin-top:14px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#FF6B35,#FFD166);border-radius:6px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);max-width:100%}
.net-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);border-radius:10px;padding:6px 10px;margin-top:10px;font-size:12px;font-weight:600}
.macro-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.macro-card{background:#fff;border-radius:16px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.macro-val{font-size:20px;font-weight:900;letter-spacing:-0.5px}
.macro-lbl{font-size:10px;font-weight:600;color:#8B95A1;margin-top:3px}
.meal-item{background:#fff;border-radius:16px;box-shadow:0 2px 6px rgba(0,0,0,0.04);overflow:hidden;margin-bottom:10px}
.meal-item-main{display:flex;align-items:center;gap:12px;padding:14px}
.meal-thumb{width:52px;height:52px;border-radius:12px;object-fit:cover;flex-shrink:0}
.meal-type-badge{font-size:10px;color:#FF6B35;font-weight:700;background:#FFF2EC;padding:2px 7px;border-radius:6px;display:inline-block;margin-bottom:4px}
.meal-food{font-size:13px;font-weight:600}
.meal-time{font-size:11px;color:#8B95A1;margin-top:2px}
.meal-kcal-right{font-size:17px;font-weight:900;color:#191F28;white-space:nowrap}
.meal-actions{display:flex;gap:0;border-top:1px solid #F2F4F7}
.meal-action-btn{flex:1;background:none;border:none;padding:10px 0;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:background 0.15s}
.meal-action-btn:first-child{border-right:1px solid #F2F4F7}
.meal-action-btn.edit{color:#2E90FA}
.meal-action-btn.edit:hover{background:#EEF4FF}
.meal-action-btn.del{color:#F04452}
.meal-action-btn.del:hover{background:#FFF0F1}
.workout-hero{background:linear-gradient(135deg,#1D4ED8,#3B82F6);border-radius:22px;padding:22px 20px;color:#fff;position:relative;overflow:hidden}
.workout-hero::before{content:'🔥';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:64px;opacity:0.15}
.wo-burned{font-size:44px;font-weight:900;letter-spacing:-2px}
.wo-cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
.wo-cat{background:#F5F6F8;border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;font-size:11px;font-weight:600;font-family:inherit}
.wo-cat.on{background:#EEF4FF;border-color:#2E90FA;color:#2E90FA}
.wo-item{background:#fff;border-radius:14px;padding:13px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,0.04);margin-bottom:8px}
.water-hero{background:linear-gradient(135deg,#0EA5E9,#38BDF8);border-radius:22px;padding:22px 20px;color:#fff;text-align:center}
.water-glasses{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.glass{font-size:26px;cursor:pointer;transition:transform 0.15s;opacity:0.35}
.glass.filled{opacity:1;transform:scale(1.05)}
.cycle-hero{background:linear-gradient(135deg,#EC4899,#F472B6);border-radius:22px;padding:22px 20px;color:#fff;position:relative;overflow:hidden}
.cycle-hero::before{content:'🌸';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:64px;opacity:0.2}
.cycle-day{font-size:48px;font-weight:900;letter-spacing:-2px}
.phase-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;margin-top:14px;gap:2px}
.phase-seg{height:100%;border-radius:3px;transition:flex 0.3s}
.stats-hero{background:linear-gradient(135deg,#7C3AED,#A78BFA);border-radius:22px;padding:22px 20px;color:#fff}
.stats-avg{font-size:44px;font-weight:900;letter-spacing:-2px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px;padding:0 4px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:6px 6px 0 0;transition:height 0.5s cubic-bezier(0.34,1.56,0.64,1);min-height:4px}
.weight-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F2F4F7}
.review-card{background:linear-gradient(135deg,#1A1F35,#2D3561);border-radius:22px;padding:22px;color:#fff;position:relative;overflow:hidden}
#editModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:flex-end;justify-content:center}
#editModal.open{display:flex}
.edit-sheet{background:#fff;border-radius:24px 24px 0 0;padding:22px 20px 40px;width:100%;max-height:85vh;overflow-y:auto}
.edit-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F2F4F7}
.kcal-unit{font-size:11px;color:#8B95A1;font-weight:500}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#191F28;color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;font-weight:600;white-space:nowrap;z-index:999;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.green{background:#12B76A}
#toast.red{background:#F04452}
</style>
</head>
<body>
<div id="app">
    <div class="topbar">
        <div class="topbar-title" id="topTitle">칼로리 스캔 🍽️</div>
        <button class="gear-btn" onclick="go('settings')">⚙️</button>
    </div>

    <div class="scr on" id="s-scan">
        <div class="content">
            <div class="card">
                <div class="sec">식사 구분</div>
                <div class="meal-grid">
                    <button class="chip on" onclick="pickMeal(this,'아침')">🌅 아침</button>
                    <button class="chip" onclick="pickMeal(this,'점심')">☀️ 점심</button>
                    <button class="chip" onclick="pickMeal(this,'저녁')">🌙 저녁</button>
                    <button class="chip" onclick="pickMeal(this,'간식')">🍪 간식</button>
                </div>
            </div>
            <div id="upSection" class="up-grid">
                <button class="up-btn">📷 카메라<input type="file" accept="image/*" capture="environment" onchange="onFile(event)"></button>
                <button class="up-btn">🖼️ 갤러리<input type="file" accept="image/*" onchange="onFile(event)"></button>
            </div>
            <div class="prev" id="prevBox">
                <img id="prevImg" src="">
                <button class="cta" onclick="doAnalyze()">🔍 AI 분석 시작</button>
                <button class="reset-btn" onclick="resetScan()">다시 선택</button>
            </div>
            <div id="loader"><div class="loader-txt">🤖 AI 분석 중...</div><div class="loader-bar"><div class="loader-fill"></div></div></div>
            <div class="err" id="errBox"></div>
            <div class="res-wrap" id="resWrap">
                <div class="cal-hero"><div class="cal-num" id="rKcal">0</div><div class="cal-sub">kcal 추정</div></div>
                <div class="card"><div id="foodList"></div><button class="cta" onclick="addFoodRow()">+ 추가</button></div>
                <button class="add-btn" onclick="addLog()">✅ 기록하기</button>
            </div>
            <div class="card">
                <div class="sec">✏️ 직접 입력</div>
                <textarea id="textFoodInput" class="inp" placeholder="비빔밥 1그릇..." style="width:100%; height:80px;"></textarea>
                <button class="cta" onclick="doTextAnalyze()">AI 칼로리 계산</button>
                <div id="textLoader">AI 계산 중...</div>
                <div id="textResWrap" style="display:none; margin-top:10px;">
                    <div id="textFoodList"></div>
                    <button class="add-btn" onclick="addTextLog()">✅ 기록하기</button>
                </div>
            </div>
        </div>
    </div>

    <div class="scr" id="s-today">
        <div class="content">
            <div class="today-hero">
                <div class="today-kcal"><span id="tKcal">0</span> kcal</div>
                <div class="net-badge">🔥 <span id="tBurned">0</span> kcal | 순 <span id="tNet">0</span> kcal</div>
                <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
            </div>
            <div class="macro-row">
                <div class="macro-card"><div class="macro-val" id="mAchieved">0%</div><div class="macro-lbl">달성률</div></div>
                <div class="macro-card"><div class="macro-val" id="mCount">0</div><div class="macro-lbl">기록수</div></div>
                <div class="macro-card"><div class="macro-val" id="mRemain">0</div><div class="macro-lbl">남은</div></div>
            </div>
            <div id="mealLogList"></div>
            <button class="del-btn" style="background:#eee; border:none; border-radius:10px; padding:15px; width:100%; margin-top:20px;" onclick="clearLog()">🗑️ 오늘 기록 삭제</button>
        </div>
    </div>

    <div class="scr" id="s-workout">
        <div class="content">
            <div class="workout-hero">
                <div class="wo-burned"><span id="woBurned">0</span> kcal</div>
            </div>
            <div class="card">
                <div class="sec">운동 선택</div>
                <div class="wo-cat-grid">
                    <button class="wo-cat on" data-met="7" onclick="pickWoCat(this)">🏃 달리기</button>
                    <button class="wo-cat" data-met="4" onclick="pickWoCat(this)">🚶 걷기</button>
                    <button class="wo-cat" data-met="6" onclick="pickWoCat(this)">🚴 사이클</button>
                </div>
                <input type="number" id="woMinsInput" class="inp" placeholder="시간(분)" style="margin-top:10px; width:100%;">
                <button class="cta" onclick="addWorkout()">운동 기록 추가</button>
            </div>
            <div id="workoutLogList"></div>
        </div>
    </div>

    <div class="scr" id="s-settings">
        <div class="content">
            <div class="card">
                <div class="settings-label">API Key</div>
                <div class="row"><input class="inp" type="password" id="apiKey" placeholder="sk-ant-..."><button class="sbtn" onclick="saveKey()">저장</button></div>
            </div>
            <div class="card">
                <div class="settings-label">목표 칼로리</div>
                <div class="row"><input class="inp" type="number" id="goalInput" placeholder="2000"><button class="sbtn" onclick="saveGoal()">저장</button></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <nav class="bnav">
        <button class="nb on" id="nb-scan" onclick="go('scan')"><span class="nb-icon">📷</span><span class="nb-txt">스캔</span></button>
        <button class="nb" id="nb-today" onclick="go('today')"><span class="nb-icon">📋</span><span class="nb-txt">오늘</span></button>
        <button class="nb" id="nb-workout" onclick="go('workout')"><span class="nb-icon">🏋️</span><span class="nb-txt">운동</span></button>
        <button class="nb" id="nb-settings" onclick="go('settings')"><span class="nb-icon">⚙️</span><span class="nb-txt">설정</span></button>
    </nav>
</div>

<script>
// --- GLOBAL STATE ---
let imgB64=null, imgType='image/jpeg', lastRes=null, lastTextRes=null;
let mealLog=[], workoutLog=[], mealType='아침', goal=2000, profile={weight:65};
const TODAY = new Date().toISOString().slice(0, 10);

// --- INIT ---
window.onload = () => {
    const k = localStorage.getItem('ck'); if(k) document.getElementById('apiKey').value = k;
    goal = parseInt(localStorage.getItem('cg') || 2000);
    const saved = localStorage.getItem('mealLog_' + TODAY); if(saved) mealLog = JSON.parse(saved);
    const woSaved = localStorage.getItem('workoutLog_' + TODAY); if(woSaved) workoutLog = JSON.parse(woSaved);
    renderLog(); renderWorkoutLog();
};

// --- NAVIGATION ---
function go(tab) {
    document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
    document.getElementById('s-' + tab).classList.add('on');
    document.getElementById('nb-' + tab).classList.add('on');
    if(tab==='today') renderLog();
}

function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'show ' + (type || '');
    setTimeout(() => { el.className = ''; }, 2000);
}

// --- API CORE (FIXED) ---
async function callClaude(payload) {
    const k = (localStorage.getItem('ck') || '').replace(/[^\x20-\x7E]/g, '').trim();
    if (!k) throw new Error('API 키를 먼저 등록하세요!');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': k,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({ ...payload, model: "claude-3-5-sonnet-20240620" })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error ? data.error.message : 'API 오류');
    return data;
}

function parseJson(text) {
    const m = text.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('JSON 찾기 실패');
    return JSON.parse(m[0]);
}

// --- ACTIONS ---
function pickMeal(btn, type) {
    document.querySelectorAll('.chip').forEach(b => b.classList.remove('on'));
    btn.classList.add('on'); mealType = type;
}

function onFile(e) {
    const file = e.target.files[0]; if (!file) return;
    imgType = file.type;
    const reader = new FileReader();
    reader.onload = ev => {
        imgB64 = ev.target.result.split(',')[1];
        document.getElementById('prevImg').src = ev.target.result;
        document.getElementById('prevBox').style.display = 'block';
        document.getElementById('upSection').style.display = 'none';
    };
    reader.readAsDataURL(file);
}

async function doAnalyze() {
    document.getElementById('loader').style.display = 'flex';
    try {
        const res = await callClaude({
            max_tokens: 1024,
            messages: [{ role: 'user', content: [{ type: 'image', source: { type: 'base64', media_type: imgType, data: imgB64 } }, { type: 'text', text: "JSON format: {total_kcal, foods: [{name, kcal}]}" }] }]
        });
        lastRes = parseJson(res.content[0].text);
        lastRes.type = mealType; lastRes.img = document.getElementById('prevImg').src;
        renderFoodList('foodList', lastRes.foods);
        document.getElementById('rKcal').textContent = lastRes.total_kcal;
        document.getElementById('resWrap').style.display = 'flex';
        document.getElementById('prevBox').style.display = 'none';
    } catch (e) { toast(e.message, 'red'); }
    finally { document.getElementById('loader').style.display = 'none'; }
}

async function doTextAnalyze() {
    const input = document.getElementById('textFoodInput').value;
    if(!input) return;
    try {
        const res = await callClaude({
            messages: [{ role: 'user', content: `Estimate kcal for: ${input}. JSON only: {total_kcal, foods: [{name, kcal}]}` }]
        });
        lastTextRes = parseJson(res.content[0].text);
        lastTextRes.type = mealType; lastTextRes.isText = true;
        renderFoodList('textFoodList', lastTextRes.foods);
        document.getElementById('textResWrap').style.display = 'block';
    } catch(e) { toast(e.message, 'red'); }
}

function addLog() {
    mealLog.push({ ...lastRes, id: Date.now(), time: new Date().toLocaleTimeString() });
    localStorage.setItem('mealLog_' + TODAY, JSON.stringify(mealLog));
    toast('기록됨!', 'green'); location.reload();
}

function addTextLog() {
    mealLog.push({ ...lastTextRes, id: Date.now(), time: new Date().toLocaleTimeString() });
    localStorage.setItem('mealLog_' + TODAY, JSON.stringify(mealLog));
    toast('기록됨!', 'green'); location.reload();
}

// --- RENDER HELPERS ---
function renderFoodList(cid, foods) {
    const el = document.getElementById(cid); el.innerHTML = '';
    foods.forEach(f => {
        const row = document.createElement('div'); row.className = 'edit-row';
        row.innerHTML = `<span>${f.name}</span><span>${f.kcal} kcal</span>`;
        el.appendChild(row);
    });
}

function renderLog() {
    let total = 0; mealLog.forEach(m => total += m.total_kcal);
    const burned = workoutLog.reduce((s, w) => s + w.kcal, 0);
    const net = Math.max(0, total - burned);
    document.getElementById('tKcal').textContent = total;
    document.getElementById('tBurned').textContent = burned;
    document.getElementById('tNet').textContent = net;
    const pct = Math.min(100, Math.round((net / goal) * 100));
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('mAchieved').textContent = pct + '%';
    document.getElementById('mCount').textContent = mealLog.length;
    document.getElementById('mRemain').textContent = Math.max(0, goal - net);
    const list = document.getElementById('mealLogList');
    list.innerHTML = mealLog.map(m => `<div class="meal-item"><b>${m.type}</b>: ${m.total_kcal}kcal</div>`).join('');
}

// --- WORKOUT ---
let selMet = 7;
function pickWoCat(btn) {
    document.querySelectorAll('.wo-cat').forEach(b => b.classList.remove('on'));
    btn.classList.add('on'); selMet = parseFloat(btn.dataset.met);
}
function addWorkout() {
    const mins = parseInt(document.getElementById('woMinsInput').value);
    if (!mins) return;
    const kcal = Math.round(selMet * profile.weight * mins / 60);
    workoutLog.push({ name: '운동', kcal, mins, id: Date.now() });
    localStorage.setItem('workoutLog_' + TODAY, JSON.stringify(workoutLog));
    renderWorkoutLog(); renderLog();
}
function renderWorkoutLog() {
    document.getElementById('woBurned').textContent = workoutLog.reduce((s, w) => s + w.kcal, 0);
    document.getElementById('workoutLogList').innerHTML = workoutLog.map(w => `<div>${w.mins}분: -${w.kcal}kcal</div>`).join('');
}

// --- SETTINGS ---
function saveKey() { localStorage.setItem('ck', document.getElementById('apiKey').value); toast('키 저장!', 'green'); }
function saveGoal() { localStorage.setItem('cg', document.getElementById('goalInput').value); location.reload(); }
function clearLog() { localStorage.removeItem('mealLog_'+TODAY); localStorage.removeItem('workoutLog_'+TODAY); location.reload(); }
function resetScan() { location.reload(); }
</script>
