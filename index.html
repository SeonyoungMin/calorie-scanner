<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>칼로리 스캔</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <div class="topbar">
        <div class="topbar-title" id="topTitle">칼로리 스캔 🍽️</div>
        <button class="gear-btn" onclick="go('settings')">⚙️</button>
    </div>

    <div class="scr on" id="s-scan">
        <div class="content">
            <div class="card">
                <div class="sec">식사 구분</div>
                <div class="meal-grid">
                    <button class="chip on" onclick="pickMeal(this,'아침')">🌅 아침</button>
                    <button class="chip" onclick="pickMeal(this,'점심')">☀️ 점심</button>
                    <button class="chip" onclick="pickMeal(this,'저녁')">🌙 저녁</button>
                    <button class="chip" onclick="pickMeal(this,'간식')">🍪 간식</button>
                </div>
            </div>
            <div id="upSection" class="up-grid">
                <button class="up-btn"><span class="up-btn-icon">📷</span>카메라 촬영<input type="file" accept="image/*" capture="environment" onchange="onFile(event)"></button>
                <button class="up-btn"><span class="up-btn-icon">🖼️</span>갤러리 선택<input type="file" accept="image/*" onchange="onFile(event)"></button>
            </div>
            <div class="prev" id="prevBox">
                <img id="prevImg" src="">
                <button class="cta" onclick="doAnalyze()">🔍 AI 분석 시작</button>
                <button class="reset-btn" onclick="resetScan()">다시 선택</button>
            </div>
            <div id="loader">
                <div class="loader-txt">🤖 AI가 음식을 분석하는 중...</div>
                <div class="loader-bar"><div class="loader-fill" style="width:100%"></div></div>
            </div>
            <div class="err" id="errBox"></div>
            <div class="res-wrap" id="resWrap">
                <div class="cal-hero">
                    <div class="cal-sub">이 식사의 칼로리</div>
                    <div class="cal-num" id="rKcal">0</div>
                    <div class="cal-sub">kcal 추정</div>
                </div>
                <div class="card">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                        <div class="sec" style="margin-bottom:0;">감지된 음식</div>
                        <button onclick="addFoodRow()" style="background:#FFF2EC; color:#FF6B35; border:none; border-radius:8px; padding:5px 10px; font-size:12px; font-weight:700; cursor:pointer;">+ 추가</button>
                    </div>
                    <div id="foodList"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="add-btn" style="flex:1;" onclick="addLog()">✅ 기록하기</button>
                    <button onclick="resetScan()" style="flex:1; background:#F5F6F8; color:#8B95A1; border:none; border-radius:14px; padding:17px; font-size:15px; font-weight:700; cursor:pointer;">❌ 취소</button>
                </div>
            </div>
            <div class="card">
                <div class="sec">✏️ 직접 입력</div>
                <textarea id="textFoodInput" class="inp" placeholder="예: 비빔밥 1그릇..." style="width:100%; min-height:80px; resize:none;"></textarea>
                <button class="cta" style="margin-top:10px;" onclick="doTextAnalyze()">🤖 AI 칼로리 계산</button>
                <div id="textLoader" style="display:none; text-align:center; padding:14px 0;">
                    <div class="loader-bar"><div class="loader-fill" style="width:100%"></div></div>
                    <div class="loader-txt" style="margin-top:8px;">AI가 계산 중...</div>
                </div>
                <div class="err" id="textErrBox"></div>
                <div id="textResWrap" style="display:none; margin-top:10px;">
                    <div id="textFoodList"></div>
                    <button class="add-btn" style="width:100%; margin-top:10px;" onclick="addTextLog()">✅ 기록하기</button>
                </div>
            </div>
        </div>
    </div>

    <div class="scr" id="s-today">
        <div class="content">
            <div class="today-hero">
                <div class="today-label">오늘 총 섭취량</div>
                <div class="today-kcal"><span id="tKcal">0</span> <span style="font-size:22px; opacity:0.5;">kcal</span></div>
                <div class="today-goal">목표 <span id="goalLbl">2000</span> kcal</div>
                <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
            </div>
            <div class="macro-row">
                <div class="macro-card"><div class="macro-val" id="mAchieved">0%</div><div class="macro-lbl">목표 달성률</div></div>
                <div class="macro-card"><div class="macro-val" id="mCount">0</div><div class="macro-lbl">기록 횟수</div></div>
                <div class="macro-card"><div class="macro-val" id="mRemain">0</div><div class="macro-lbl">남은 kcal</div></div>
            </div>
            <div id="mealLogList"></div>
            <button class="del-btn" style="margin-top:20px;" onclick="clearLog()">🗑️ 오늘 기록 전체 삭제</button>
        </div>
    </div>

    <div class="scr" id="s-settings">
        <div class="content">
            <div class="card">
                <div class="settings-label">Claude API Key</div>
                <div class="row"><input class="inp" type="password" id="apiKey" placeholder="sk-ant-..."><button class="sbtn" onclick="saveKey()">저장</button></div>
            </div>
            <div class="card">
                <div class="settings-label">하루 목표 칼로리</div>
                <div class="row"><input class="inp" type="number" id="goalInput" placeholder="2000"><button class="sbtn" onclick="saveGoal()">저장</button></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <nav class="bnav">
        <button class="nb on" id="nb-scan" onclick="go('scan')"><span class="nb-icon">📷</span><span class="nb-txt">스캔</span></button>
        <button class="nb" id="nb-today" onclick="go('today')"><span class="nb-icon">📋</span><span class="nb-txt">오늘</span></button>
        <button class="nb" id="nb-settings" onclick="go('settings')"><span class="nb-icon">⚙️</span><span class="nb-txt">설정</span></button>
    </nav>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
