<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>칼로리 스캔</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; background: #F4F6FA; color: #191F28; font-family: 'Noto Sans KR', -apple-system, sans-serif; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; padding-top: env(safe-area-inset-top, 0px); }

        /* TOPBAR */
        .topbar { background: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #EAECF0; flex-shrink: 0; }
        .topbar-title { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        .gear-btn { background: none; border: none; font-size: 20px; cursor: pointer; }

        /* SCREENS */
        .scr { display: none; flex-direction: column; flex: 1; overflow-y: auto; padding-bottom: 110px; }
        .scr.on { display: flex; }

        /* BOTTOM NAV */
        .bnav { position: fixed; bottom: 0; left: 0; right: 0; height: calc(64px + env(safe-area-inset-bottom, 0px)); background: #fff; border-top: 1px solid #EAECF0; display: flex; z-index: 100; }
        .nb { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; gap: 4px; }
        .nb-icon { font-size: 22px; transition: transform 0.15s; }
        .nb.on .nb-icon { transform: scale(1.15); }
        .nb-txt { font-size: 10px; color: #8B95A1; font-weight: 500; }
        .nb.on .nb-txt { color: #FF6B35; font-weight: 700; }

        /* CONTENT */
        .content { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
        .card { background: #fff; border-radius: 20px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .sec { font-size: 11px; font-weight: 700; color: #8B95A1; margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }

        /* FORM ELEMENTS */
        .row { display: flex; gap: 8px; }
        .inp { flex: 1; background: #F5F6F8; border: 1.5px solid #EAECF0; border-radius: 12px; padding: 12px 14px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .inp:focus { border-color: #FF6B35; }
        .sbtn { background: #FF6B35; color: #fff; border: none; border-radius: 12px; padding: 12px 18px; font-weight: 700; font-family: inherit; cursor: pointer; font-size: 14px; }

        /* MEAL CHIPS */
        .meal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .chip { background: #F5F6F8; border-radius: 12px; padding: 10px 4px; cursor: pointer; border: 1.5px solid transparent; font-size: 13px; font-family: inherit; font-weight: 500; transition: all 0.15s; text-align: center; }
        .chip.on { background: #FFF2EC; border-color: #FF6B35; color: #FF6B35; font-weight: 700; }

        /* UPLOAD */
        .up-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .up-btn { background: #fff; border: 1.5px dashed #D0D5DD; border-radius: 18px; padding: 28px 10px; text-align: center; position: relative; cursor: pointer; font-weight: 600; font-size: 14px; font-family: inherit; color: #344054; transition: all 0.15s; }
        .up-btn:hover { border-color: #FF6B35; background: #FFF8F5; }
        .up-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .up-btn-icon { font-size: 28px; display: block; margin-bottom: 8px; }

        /* PREVIEW */
        .prev { border-radius: 18px; overflow: hidden; display: none; margin-top: 4px; }
        .prev img { width: 100%; max-height: 260px; object-fit: cover; display: block; }
        .cta { background: #FF6B35; color: #fff; border: none; border-radius: 14px; padding: 17px; font-size: 16px; font-weight: 700; font-family: inherit; width: 100%; margin-top: 10px; cursor: pointer; letter-spacing: -0.3px; transition: opacity 0.15s; }
        .cta:active { opacity: 0.85; }
        .reset-btn { background: none; border: none; color: #8B95A1; width: 100%; margin-top: 8px; font-size: 13px; font-family: inherit; cursor: pointer; text-decoration: underline; padding: 6px; }

        /* RESULT */
        .res-wrap { display: none; flex-direction: column; gap: 12px; margin-top: 4px; }
        .cal-hero { background: linear-gradient(135deg, #FF6B35 0%, #FF9A6C 100%); border-radius: 20px; padding: 28px 20px; color: #fff; text-align: center; }
        .cal-num { font-size: 58px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .cal-sub { font-size: 14px; font-weight: 600; opacity: 0.85; margin-top: 6px; }
        .food-item-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F2F4F7; }
        .food-item-row:last-child { border-bottom: none; }
        .food-name { font-size: 14px; font-weight: 500; }
        .food-kcal { font-size: 14px; font-weight: 700; color: #FF6B35; }
        .add-btn { background: #12B76A; color: #fff; border: none; border-radius: 14px; padding: 17px; font-size: 16px; font-weight: 700; font-family: inherit; width: 100%; cursor: pointer; letter-spacing: -0.3px; }

        /* LOADER */
        #loader { display: none; flex-direction: column; align-items: center; padding: 30px 20px; gap: 12px; }
        .loader-bar { width: 100%; height: 4px; background: #F0F0F0; border-radius: 2px; overflow: hidden; }
        .loader-fill { height: 100%; background: linear-gradient(90deg, #FF6B35, #FFAB85, #FF6B35); background-size: 200%; animation: shimmer 1.5s infinite; border-radius: 2px; }
        @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }
        .loader-txt { font-size: 14px; font-weight: 700; color: #FF6B35; }

        /* ERROR */
        .err { background: #FFF0F1; color: #F04452; padding: 14px; border-radius: 12px; display: none; font-size: 13px; margin-top: 4px; font-weight: 500; }

        /* TODAY SCREEN */
        .today-hero { border-radius: 22px; padding: 24px 20px; background: #191F28; color: #fff; position: relative; overflow: hidden; }
        .today-hero::before { content: ''; position: absolute; right: -30px; top: -30px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,107,53,0.15); }
        .today-hero::after { content: ''; position: absolute; right: 20px; top: 20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,107,53,0.1); }
        .today-label { font-size: 12px; opacity: 0.5; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
        .today-kcal { font-size: 48px; font-weight: 900; letter-spacing: -2px; margin: 4px 0; }
        .today-goal { font-size: 13px; opacity: 0.6; font-weight: 500; }

        /* PROGRESS BAR */
        .prog-wrap { background: rgba(255,255,255,0.12); border-radius: 6px; height: 8px; margin-top: 16px; overflow: hidden; }
        .prog-fill { height: 100%; background: linear-gradient(90deg, #FF6B35, #FFD166); border-radius: 6px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); max-width: 100%; }

        /* MACRO ROW */
        .macro-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .macro-card { background: #fff; border-radius: 16px; padding: 14px 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .macro-val { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
        .macro-lbl { font-size: 11px; font-weight: 600; color: #8B95A1; margin-top: 3px; }

        /* MEAL LOG */
        .meal-item { background: #fff; border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .meal-thumb { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
        .meal-type-badge { font-size: 10px; color: #FF6B35; font-weight: 700; background: #FFF2EC; padding: 2px 7px; border-radius: 6px; display: inline-block; margin-bottom: 4px; }
        .meal-food { font-size: 14px; font-weight: 600; }
        .meal-time { font-size: 11px; color: #8B95A1; margin-top: 2px; }
        .meal-kcal-right { font-size: 18px; font-weight: 900; color: #191F28; letter-spacing: -0.5px; }

        /* AI REVIEW */
        .review-card { background: linear-gradient(135deg, #1A1F35, #2D3561); border-radius: 22px; padding: 22px; color: #fff; position: relative; overflow: hidden; }
        .review-card::before { content: '✨'; position: absolute; right: 16px; top: 16px; font-size: 32px; opacity: 0.3; }
        .review-title { font-size: 13px; font-weight: 700; opacity: 0.6; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
        .stars-row { display: flex; gap: 4px; margin-bottom: 12px; }
        .star { font-size: 26px; transition: transform 0.2s; }
        .star.lit { filter: drop-shadow(0 0 4px #FFD16688); }
        .review-text { font-size: 14px; line-height: 1.7; opacity: 0.88; font-weight: 400; }
        .review-btn { margin-top: 14px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 12px; padding: 12px; font-size: 13px; font-weight: 700; font-family: inherit; width: 100%; cursor: pointer; transition: background 0.15s; }
        .review-btn:hover { background: rgba(255,255,255,0.2); }
        .review-loading { font-size: 13px; opacity: 0.6; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 50px 20px; color: #8B95A1; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-txt { font-size: 15px; font-weight: 600; }
        .empty-sub { font-size: 13px; margin-top: 6px; }

        /* SETTINGS */
        .settings-section { display: flex; flex-direction: column; gap: 14px; }
        .settings-label { font-size: 12px; font-weight: 700; color: #8B95A1; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }

        /* DELETE BTN */
        .del-btn { background: none; color: #8B95A1; border: 1.5px solid #EAECF0; border-radius: 14px; padding: 14px; font-size: 14px; font-weight: 600; font-family: inherit; width: 100%; cursor: pointer; }
        /* EDITABLE FOOD ROW */
        .edit-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid #F2F4F7; }
        .edit-row:last-child { border-bottom:none; }
        .edit-name { flex:1; border:1.5px solid #EAECF0; border-radius:8px; padding:7px 10px; font-size:13px; font-family:inherit; background:#F9FAFB; outline:none; min-width:0; }
        .edit-name:focus { border-color:#FF6B35; background:#fff; }
        .edit-kcal { width:72px; border:1.5px solid #EAECF0; border-radius:8px; padding:7px 8px; font-size:13px; font-family:inherit; background:#F9FAFB; outline:none; text-align:center; }
        .edit-kcal:focus { border-color:#FF6B35; background:#fff; }
        .del-row-btn { background:none; border:none; color:#ccc; font-size:18px; cursor:pointer; padding:2px 4px; flex-shrink:0; line-height:1; }
        .del-row-btn:hover { color:#F04452; }
        .kcal-unit { font-size:11px; color:#8B95A1; font-weight:500; flex-shrink:0; }
        .edit-kcal { transition: opacity 0.2s; }
        /* TOAST */
        #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
            background:#191F28; color:#fff; padding:11px 20px; border-radius:24px;
            font-size:14px; font-weight:600; white-space:nowrap; z-index:999;
            opacity:0; transition:opacity 0.2s, transform 0.2s; pointer-events:none; }
        #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        #toast.green { background:#12B76A; }
        #toast.red   { background:#F04452; }
    </style>
</head>
<body>
<div id="app">
    <div class="topbar">
        <div class="topbar-title" id="topTitle">칼로리 스캔 🍽️</div>
        <button class="gear-btn" onclick="go('settings')">⚙️</button>
    </div>

    <!-- SCAN -->
    <div class="scr on" id="s-scan">
        <div class="content">
            <div class="card">
                <div class="sec">식사 구분</div>
                <div class="meal-grid">
                    <button class="chip on" onclick="pickMeal(this,'아침')">🌅 아침</button>
                    <button class="chip" onclick="pickMeal(this,'점심')">☀️ 점심</button>
                    <button class="chip" onclick="pickMeal(this,'저녁')">🌙 저녁</button>
                    <button class="chip" onclick="pickMeal(this,'간식')">🍪 간식</button>
                </div>
            </div>
            <div id="upSection" class="up-grid">
                <button class="up-btn"><span class="up-btn-icon">📷</span>카메라 촬영<input type="file" accept="image/*" capture="environment" onchange="onFile(event)"></button>
                <button class="up-btn"><span class="up-btn-icon">🖼️</span>갤러리 선택<input type="file" accept="image/*" onchange="onFile(event)"></button>
            </div>
            <div class="prev" id="prevBox">
                <img id="prevImg" src="">
                <button class="cta" onclick="doAnalyze()">🔍 AI 분석 시작</button>
                <button class="reset-btn" onclick="resetScan()">다시 선택</button>
            </div>
            <div id="loader">
                <div class="loader-txt">🤖 AI가 음식을 분석하는 중...</div>
                <div class="loader-bar"><div class="loader-fill" style="width:100%"></div></div>
            </div>
            <div class="err" id="errBox"></div>
            <div class="res-wrap" id="resWrap">
                <div class="cal-hero">
                    <div class="cal-sub">이 식사의 칼로리</div>
                    <div class="cal-num" id="rKcal">0</div>
                    <div class="cal-sub">kcal 추정</div>
                </div>
                <div class="card">
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                        <div class="sec" style="margin-bottom:0;">감지된 음식</div>
                        <button onclick="addFoodRow()" style="background:#FFF2EC; color:#FF6B35; border:none; border-radius:8px; padding:5px 10px; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer;">+ 추가</button>
                    </div>
                    <div id="foodList"></div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="add-btn" style="flex:1;" onclick="addLog()">✅ 기록하기</button>
                    <button onclick="resetScan()" style="flex:1; background:#F5F6F8; color:#8B95A1; border:none; border-radius:14px; padding:17px; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;">❌ 아니오</button>
                </div>
            </div>

            <!-- TEXT INPUT SECTION -->
            <div class="card" id="textInputCard">
                <div class="sec">✏️ 직접 입력으로 칼로리 계산</div>
                <div style="position:relative;">
                    <textarea id="textFoodInput" class="inp" placeholder="예: 비빔밥 1그릇, 콜라 500ml, 치킨 2조각..." style="width:100%; min-height:80px; resize:none; border-radius:12px; padding:12px 14px; font-size:14px; line-height:1.6;"></textarea>
                </div>
                <button class="cta" style="margin-top:10px;" onclick="doTextAnalyze()">🤖 AI 칼로리 계산하기</button>
                <div id="textLoader" style="display:none; text-align:center; padding:14px 0;">
                    <div class="loader-bar"><div class="loader-fill" style="width:100%"></div></div>
                    <div class="loader-txt" style="margin-top:8px;">AI가 계산하는 중...</div>
                </div>
                <div class="err" id="textErrBox"></div>
                <div id="textResWrap" style="display:none; margin-top:10px;">
                    <div style="background:linear-gradient(135deg,#2E90FA,#6DC3FF); border-radius:16px; padding:20px; color:#fff; text-align:center; margin-bottom:12px;">
                        <div style="font-size:13px; font-weight:600; opacity:0.85;">총 칼로리</div>
                        <div style="font-size:48px; font-weight:900; letter-spacing:-2px;" id="tTextKcal">0</div>
                        <div style="font-size:13px; font-weight:600; opacity:0.85;">kcal 추정</div>
                    </div>
                    <div class="card" style="padding:14px; box-shadow:none; border:1.5px solid #EAECF0;">
                        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                            <div class="sec" style="margin-bottom:0;">음식별 칼로리</div>
                            <button onclick="addTextFoodRow()" style="background:#EEF4FF; color:#2E90FA; border:none; border-radius:8px; padding:5px 10px; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer;">+ 추가</button>
                        </div>
                        <div id="textFoodList"></div>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:4px;">
                        <button class="add-btn" style="flex:1;" onclick="addTextLog()">✅ 기록하기</button>
                        <button onclick="resetTextInput()" style="flex:1; background:#F5F6F8; color:#8B95A1; border:none; border-radius:14px; padding:17px; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;">❌ 아니오</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TODAY -->
    <div class="scr" id="s-today">
        <div class="content">
            <div class="today-hero">
                <div class="today-label">오늘 총 섭취량</div>
                <div class="today-kcal"><span id="tKcal">0</span> <span style="font-size:22px; opacity:0.5;">kcal</span></div>
                <div class="today-goal">목표 <span id="goalLbl">2000</span> kcal</div>
                <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
            </div>

            <div class="macro-row">
                <div class="macro-card">
                    <div class="macro-val" id="mAchieved" style="color:#FF6B35;">0%</div>
                    <div class="macro-lbl">목표 달성률</div>
                </div>
                <div class="macro-card">
                    <div class="macro-val" id="mCount" style="color:#12B76A;">0</div>
                    <div class="macro-lbl">기록 횟수</div>
                </div>
                <div class="macro-card">
                    <div class="macro-val" id="mRemain" style="color:#2E90FA;">0</div>
                    <div class="macro-lbl">남은 kcal</div>
                </div>
            </div>

            <!-- AI REVIEW -->
            <div class="review-card" id="reviewCard" style="display:none;">
                <div class="review-title">🤖 AI 오늘의 식단 총평</div>
                <div class="stars-row" id="starsRow"></div>
                <div class="review-text" id="reviewText"></div>
            </div>
            <button class="review-btn" id="reviewGenBtn" onclick="generateReview()" style="background:#fff; color:#191F28; border:1.5px solid #EAECF0; border-radius:14px; padding:14px; font-size:14px; font-weight:700; font-family:inherit; width:100%; cursor:pointer; display:none;">✨ AI 식단 총평 받기</button>

            <div id="mealLogList"></div>
            <div id="deleteWrap">
                <button class="del-btn" onclick="showDeleteConfirm()">🗑️ 오늘 기록 전체 삭제</button>
            </div>
            <div id="deleteConfirm" style="display:none; background:#FFF0F1; border-radius:16px; padding:16px; text-align:center;">
                <div style="font-size:14px; font-weight:600; color:#F04452; margin-bottom:12px;">정말 전체 삭제할까요?</div>
                <div style="display:flex; gap:10px;">
                    <button onclick="clearLog()" style="flex:1; background:#F04452; color:#fff; border:none; border-radius:12px; padding:13px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;">삭제</button>
                    <button onclick="hideDeleteConfirm()" style="flex:1; background:#F5F6F8; color:#8B95A1; border:none; border-radius:12px; padding:13px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;">취소</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SETTINGS -->
    <div class="scr" id="s-settings">
        <div class="content">
            <div class="card">
                <div class="settings-label">Claude API Key</div>
                <div class="row"><input class="inp" type="password" id="apiKey" placeholder="sk-ant-api03-..."><button class="sbtn" onclick="saveKey()">저장</button></div>
                <div style="font-size:12px; color:#8B95A1; margin-top:10px; line-height:1.6;">API 키는 기기에만 저장되며 외부로 전송되지 않습니다. <a href="https://console.anthropic.com" target="_blank" style="color:#FF6B35;">콘솔에서 발급</a>하세요.</div>
            </div>
            <div class="card">
                <div class="settings-label">하루 목표 칼로리</div>
                <div class="row"><input class="inp" type="number" id="goalInput" placeholder="2000"><button class="sbtn" onclick="saveGoal()">저장</button></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <nav class="bnav">
        <button class="nb on" id="nb-scan" onclick="go('scan')"><span class="nb-icon">📷</span><span class="nb-txt">스캔</span></button>
        <button class="nb" id="nb-today" onclick="go('today')"><span class="nb-icon">📋</span><span class="nb-txt">오늘</span></button>
        <button class="nb" id="nb-settings" onclick="go('settings')"><span class="nb-icon">⚙️</span><span class="nb-txt">설정</span></button>
    </nav>
</div>

<script>
let _toastTimer = null;
function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (type ? ' ' + type : '');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { el.className = ''; }, 2200);
}

let imgB64 = null, imgType = 'image/jpeg', lastRes = null, lastTextRes = null;
let mealLog = [], mealType = '아침', goal = 2000;

const TODAY = new Date().toISOString().slice(0, 10);

window.onload = () => {
    const k = localStorage.getItem('ck');
    if (k) document.getElementById('apiKey').value = k;
    goal = parseInt(localStorage.getItem('cg') || 2000);
    document.getElementById('goalLbl').textContent = goal;
    document.getElementById('goalInput').value = goal;
    const saved = localStorage.getItem('mealLog_' + TODAY);
    if (saved) mealLog = JSON.parse(saved);
    renderLog();
};

function go(tab) {
    document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
    document.getElementById('s-' + tab).classList.add('on');
    document.getElementById('nb-' + tab).classList.add('on');
    const titles = { scan:'칼로리 스캔 🍽️', today:'오늘 식단 📋', settings:'설정 ⚙️' };
    document.getElementById('topTitle').textContent = titles[tab];
    if (tab === 'today') renderLog();
}

function saveKey() {
    const raw = document.getElementById('apiKey').value;
    const k = raw.replace(/[^\x20-\x7E]/g, '').trim();
    if (!k) { toast('API 키를 입력하세요.', 'red'); return; }
    if (k !== raw.trim()) toast('⚠️ 이상한 문자가 제거됐어요. 붙여넣기로만 입력하세요!', 'red');
    if (!k.startsWith('sk-ant-')) { toast('⚠️ API 키는 sk-ant- 로 시작해야 해요.', 'red'); return; }
    document.getElementById('apiKey').value = k;
    localStorage.setItem('ck', k);
    toast('✅ API 키 저장 완료!', 'green');
}

function saveGoal() {
    const g = parseInt(document.getElementById('goalInput').value);
    if (!g || g < 100) { toast('올바른 칼로리를 입력하세요.', 'red'); return; }
    goal = g;
    localStorage.setItem('cg', g);
    document.getElementById('goalLbl').textContent = g;
    toast('✅ 목표 칼로리 저장 완료!', 'green');
}

function pickMeal(btn, type) {
    document.querySelectorAll('.chip').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    mealType = type;
}

function onFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    imgType = file.type;
    const reader = new FileReader();
    reader.onload = ev => {
        imgB64 = ev.target.result.split(',')[1];
        document.getElementById('prevImg').src = ev.target.result;
        document.getElementById('prevBox').style.display = 'block';
        document.getElementById('upSection').style.display = 'none';
        document.getElementById('resWrap').style.display = 'none';
    };
    reader.readAsDataURL(file);
}

async function callClaude(payload) {
    const k = (localStorage.getItem('ck') || '').replace(/[^\x20-\x7E]/g, '').trim();
    if (!k) throw new Error('설정에서 API 키를 먼저 등록하세요!');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': k,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error ? data.error.message : 'API error ' + res.status);
    return data;
}

function parseJson(text) {
    const m = text.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('응답 파싱 실패');
    return JSON.parse(m[0]);
}

async function doAnalyze() {
    const k = localStorage.getItem('ck');
    if (!k) { toast('⚠️ 설정에서 API 키를 먼저 등록하세요!', 'red'); return; }
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('errBox').style.display = 'none';
    document.getElementById('resWrap').style.display = 'none';

    try {
        const PROMPT = 'Analyze the food in this image and estimate calories. Reply ONLY with JSON, no other text: {"total_kcal": number, "foods": [{"name": "Korean food name", "kcal": number}]}';
        const data = await callClaude({
            model: 'claude-opus-4-5',
            max_tokens: 1024,
            messages: [{
                role: 'user',
                content: [
                    { type: 'image', source: { type: 'base64', media_type: imgType, data: imgB64 } },
                    { type: 'text', text: PROMPT }
                ]
            }]
        });

        const result = parseJson(data.content[0].text);
        lastRes = { ...result, img: document.getElementById('prevImg').src, type: mealType };
        renderFoodList('foodList', lastRes.foods, 'img');
        recalcTotal('img');
        document.getElementById('resWrap').style.display = 'flex';
        document.getElementById('prevBox').style.display = 'none';
    } catch (err) {
        document.getElementById('errBox').textContent = '⚠️ ' + err.message;
        document.getElementById('errBox').style.display = 'block';
    } finally {
        document.getElementById('loader').style.display = 'none';
    }
}

function addLog() {
    if (!lastRes) return;
    lastRes.foods = collectFoods('foodList');
    lastRes.total_kcal = lastRes.foods.reduce((s, f) => s + f.kcal, 0);
    mealLog.push({ ...lastRes, id: Date.now(), time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) });
    saveMealLog();
    localStorage.removeItem('review_' + TODAY);
    toast('✅ 식단에 기록됐어요!', 'green');
    resetScan();
    go('today');
}

function saveMealLog() {
    localStorage.setItem('mealLog_' + TODAY, JSON.stringify(mealLog));
}

function renderLog() {
    let total = 0;
    mealLog.forEach(m => total += m.total_kcal);
    document.getElementById('tKcal').textContent = total.toLocaleString();

    const pct = Math.min(100, Math.round((total / goal) * 100));
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('mAchieved').textContent = pct + '%';
    document.getElementById('mCount').textContent = mealLog.length;
    document.getElementById('mRemain').textContent = Math.max(0, goal - total).toLocaleString();

    const list = document.getElementById('mealLogList');
    if (mealLog.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-txt">아직 기록이 없어요</div><div class="empty-sub">음식을 스캔해서 추가해보세요</div></div>`;
        document.getElementById('reviewCard').style.display = 'none';
        document.getElementById('reviewGenBtn').style.display = 'none';
    } else {
        list.innerHTML = mealLog.map(m => `
            <div class="meal-item" style="margin-bottom:10px;">
                ${m.isText
                    ? `<div style="width:56px;height:56px;border-radius:12px;background:#EEF4FF;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">📝</div>`
                    : `<img src="${m.img}" class="meal-thumb">`
                }
                <div style="flex:1; min-width:0;">
                    <div class="meal-type-badge">${m.type}</div>
                    <div class="meal-food">${m.foods[0].name}${m.foods.length > 1 ? ' 외 ' + (m.foods.length-1) + '가지' : ''}</div>
                    <div class="meal-time">${m.time}</div>
                </div>
                <div class="meal-kcal-right">${m.total_kcal.toLocaleString()}<span style="font-size:11px; font-weight:500; color:#8B95A1;">kcal</span></div>
            </div>
        `).join('');

        // Show review if saved
        const savedReview = localStorage.getItem('review_' + TODAY);
        if (savedReview) {
            const rv = JSON.parse(savedReview);
            showReview(rv.stars, rv.text);
        } else {
            document.getElementById('reviewCard').style.display = 'none';
            document.getElementById('reviewGenBtn').style.display = 'block';
        }
    }
}

function renderStars(n) {
    return [1,2,3,4,5].map(i =>
        `<span class="star ${i <= n ? 'lit' : ''}">${i <= n ? '⭐' : '☆'}</span>`
    ).join('');
}

function showReview(stars, text) {
    document.getElementById('starsRow').innerHTML = renderStars(stars);
    document.getElementById('reviewText').textContent = text;
    document.getElementById('reviewCard').style.display = 'block';
    document.getElementById('reviewGenBtn').style.display = 'block';
    document.getElementById('reviewGenBtn').textContent = '🔄 다시 총평 받기';
}

async function generateReview() {
    const k = localStorage.getItem('ck');
    if (!k) { toast('⚠️ 설정에서 API 키를 먼저 등록하세요!', 'red'); return; }
    if (mealLog.length === 0) { toast('기록된 식단이 없습니다.', 'red'); return; }

    const btn = document.getElementById('reviewGenBtn');
    btn.textContent = '⏳ 분석 중...';
    btn.disabled = true;

    try {
        const total = mealLog.reduce((s, m) => s + m.total_kcal, 0);
        const meals = mealLog.map(m => `${m.type}: ${m.foods.map(f => `${f.name}(${f.kcal}kcal)`).join(', ')}`).join(' / ');
        const PROMPT = `Goal: ${goal}kcal, Actual: ${total}kcal. Meals: ${meals}. Rate this diet and give advice. Reply ONLY with JSON, no other text: {"stars": integer 1-5, "review": "2-3 sentences in Korean about calorie achievement, balance, and improvement tips"}`;
        const data = await callClaude({
            model: 'claude-opus-4-5',
            max_tokens: 512,
            messages: [{ role: 'user', content: PROMPT }]
        });

        const rv = parseJson(data.content[0].text);
        localStorage.setItem('review_' + TODAY, JSON.stringify({ stars: rv.stars, text: rv.review }));
        showReview(rv.stars, rv.review);
    } catch (err) {
        toast('⚠️ 총평 생성 실패: ' + err.message, 'red');
    } finally {
        btn.textContent = '🔄 다시 총평 받기';
        btn.disabled = false;
    }
}

// ── FOOD EDIT HELPERS ─────────────────────────────
function renderFoodList(containerId, foods, mode) {
    const el = document.getElementById(containerId);
    el.dataset.mode = mode;
    el.innerHTML = '';
    foods.forEach((f, i) => {
        const row = buildRow(f.name, f.kcal, mode);
        el.appendChild(row);
    });
}

function buildRow(name, kcal, mode) {
    const row = document.createElement('div');
    row.className = 'edit-row';
    row.dataset.mode = mode;

    const nameInp = document.createElement('input');
    nameInp.className = 'edit-name';
    nameInp.value = name;
    nameInp.placeholder = '음식 이름';

    const kcalInp = document.createElement('input');
    kcalInp.className = 'edit-kcal';
    kcalInp.type = 'number';
    kcalInp.value = kcal;
    kcalInp.placeholder = '0';

    const unit = document.createElement('span');
    unit.className = 'kcal-unit';
    unit.textContent = 'kcal';

    const delBtn = document.createElement('button');
    delBtn.className = 'del-row-btn';
    delBtn.title = '삭제';
    delBtn.textContent = '✕';

    // 음식 이름 입력 완료(blur) 시 AI 자동 칼로리 조회
    let lookupTimer = null;
    nameInp.addEventListener('input', () => {
        clearTimeout(lookupTimer);
        kcalInp.style.opacity = '0.4';
        lookupTimer = setTimeout(() => autoLookupKcal(nameInp, kcalInp, mode), 900);
    });

    kcalInp.addEventListener('input', () => {
        const containerId = mode === 'img' ? 'foodList' : 'textFoodList';
        recalcTotal(mode);
    });

    delBtn.addEventListener('click', () => {
        row.remove();
        recalcTotal(mode);
    });

    row.appendChild(nameInp);
    row.appendChild(kcalInp);
    row.appendChild(unit);
    row.appendChild(delBtn);
    return row;
}

function collectFoods(containerId) {
    return [...document.querySelectorAll(`#${containerId} .edit-row`)].map(row => ({
        name: row.querySelector('.edit-name').value.trim() || '음식',
        kcal: parseInt(row.querySelector('.edit-kcal').value) || 0
    }));
}

function recalcTotal(mode) {
    const containerId = mode === 'img' ? 'foodList' : 'textFoodList';
    const totalId     = mode === 'img' ? 'rKcal'    : 'tTextKcal';
    const total = collectFoods(containerId).reduce((s, f) => s + f.kcal, 0);
    document.getElementById(totalId).textContent = total.toLocaleString();
}

function delFoodRow(btn, containerId, mode) {
    btn.closest('.edit-row').remove();
    recalcTotal(mode);
}

function addFoodRow() {
    const el = document.getElementById('foodList');
    const row = buildRow('', 0, 'img');
    el.appendChild(row);
    row.querySelector('.edit-name').focus();
}

function addTextFoodRow() {
    const el = document.getElementById('textFoodList');
    const row = buildRow('', 0, 'text');
    el.appendChild(row);
    row.querySelector('.edit-name').focus();
}

// ── 음식 이름으로 AI 칼로리 자동 조회 ──
let lookupCache = {};
async function autoLookupKcal(nameInp, kcalInp, mode) {
    const name = nameInp.value.trim();
    if (!name || name.length < 2) { kcalInp.style.opacity = '1'; return; }

    if (lookupCache[name] !== undefined) {
        kcalInp.value = lookupCache[name];
        kcalInp.style.opacity = '1';
        recalcTotal(mode);
        return;
    }

    try {
        const PROMPT = 'Estimate calories for one serving of: "' + name + '". Reply ONLY with JSON: {"kcal": number}';
        const data = await callClaude({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 64,
            messages: [{ role: 'user', content: PROMPT }]
        });
        const result = parseJson(data.content[0].text);
        if (result.kcal) {
            lookupCache[name] = result.kcal;
            // only update if the name input still matches (user didn't retype)
            if (nameInp.value.trim() === name) {
                kcalInp.value = result.kcal;
                recalcTotal(mode);
            }
        }
    } catch(e) { /* silent fail */ } finally {
        kcalInp.style.opacity = '1';
    }
}
// ──────────────────────────────────────────────────

function resetScan() {
    imgB64 = null;
    lastRes = null;
    document.getElementById('prevBox').style.display = 'none';
    document.getElementById('upSection').style.display = 'grid';
    document.getElementById('resWrap').style.display = 'none';
    document.getElementById('errBox').style.display = 'none';
}

function resetTextInput() {
    document.getElementById('textFoodInput').value = '';
    document.getElementById('textResWrap').style.display = 'none';
    document.getElementById('textErrBox').style.display = 'none';
    lastTextRes = null;
}

async function doTextAnalyze() {
    const k = localStorage.getItem('ck');
    if (!k) { toast('⚠️ 설정에서 API 키를 먼저 등록하세요!', 'red'); return; }
    const input = document.getElementById('textFoodInput').value.trim();
    if (!input) { toast('음식을 입력해주세요.', 'red'); return; }

    document.getElementById('textLoader').style.display = 'block';
    document.getElementById('textErrBox').style.display = 'none';
    document.getElementById('textResWrap').style.display = 'none';

    try {
        const PROMPT = `Estimate calories for: "${input}". Reply ONLY with JSON, no other text: {"total_kcal": number, "foods": [{"name": "Korean food name", "kcal": number}]}`;
        const data = await callClaude({
            model: 'claude-opus-4-5',
            max_tokens: 1024,
            messages: [{ role: 'user', content: PROMPT }]
        });

        const result = parseJson(data.content[0].text);
        lastTextRes = { ...result, img: null, type: mealType, isText: true };
        renderFoodList('textFoodList', lastTextRes.foods, 'text');
        recalcTotal('text');
        document.getElementById('textResWrap').style.display = 'block';
    } catch (err) {
        document.getElementById('textErrBox').textContent = '⚠️ ' + err.message;
        document.getElementById('textErrBox').style.display = 'block';
    } finally {
        document.getElementById('textLoader').style.display = 'none';
    }
}

function addTextLog() {
    if (!lastTextRes) return;
    lastTextRes.foods = collectFoods('textFoodList');
    lastTextRes.total_kcal = lastTextRes.foods.reduce((s, f) => s + f.kcal, 0);
    mealLog.push({ ...lastTextRes, id: Date.now(), time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) });
    saveMealLog();
    localStorage.removeItem('review_' + TODAY);
    toast('✅ 식단에 기록됐어요!', 'green');
    resetTextInput();
    go('today');
}

function showDeleteConfirm() {
    document.getElementById('deleteWrap').style.display = 'none';
    document.getElementById('deleteConfirm').style.display = 'block';
}
function hideDeleteConfirm() {
    document.getElementById('deleteWrap').style.display = 'block';
    document.getElementById('deleteConfirm').style.display = 'none';
}
function clearLog() {
    localStorage.removeItem('mealLog_' + TODAY);
    localStorage.removeItem('review_' + TODAY);
    mealLog = [];
    hideDeleteConfirm();
    renderLog();
}
</script>
